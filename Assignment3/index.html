<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        nav {
    margin-bottom: 20px;
    }

    nav a {
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border: 2px solid white;
        border-radius: 5px;
        transition: .3s;
    }

    nav a:hover {
        background: white;
        color: #2e7d32;
    }
    </style>

        <nav>
        <a href="https://aimeldalapc.github.io/WST154/">Home</a>
    </nav>
</head>
<body>

    <h1 id="timer">00:00:00</h1>

    <button onclick="startWatch()">Start</button>
    <button onclick="stopWatch()">Stop</button>
    <button onclick="resetWatch()">Reset</button>

    <script>
        let seconds = 0;
        let timer;

        function updateTime() {
            seconds++;

            let hrs = Math.floor(seconds / 3600);
            let mins = Math.floor((seconds % 3600) / 60);
            let secs = seconds % 60;

            document.getElementById("timer").innerHTML =
                String(hrs).padStart(2, '0') + ":" +
                String(mins).padStart(2, '0') + ":" +
                String(secs).padStart(2, '0');
        }

        function startWatch() {
            if (!timer) {
                timer = setInterval(updateTime, 1000);
            }
        }

        function stopWatch() {
            clearInterval(timer);
            timer = null;
        }

        function resetWatch() {
            stopWatch();
            seconds = 0;
            document.getElementById("timer").innerHTML = "00:00:00";
        }
    </script>

</body>
</html>
