<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Haven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
        <a href="https://aimeldalapc.github.io/WST154/">Home</a>
    </nav>
        <h1>Book Haven</h1>
        <p>Discover books for every mood and imagination.</p>
    </header>

    <main>
        <section class="controls">
            <label for="genreSelect">Choose a book genre:</label>
            <select id="genreSelect">
                <option value="all">All Books</option>
                <option value="fiction">Fiction</option>
                <option value="poetry">Poetry</option>
                <option value="romance">Romance</option>
            </select>
        </section>

        <section class="carousel-section">
            <h2>Featured Books</h2>
            <div class="carousel">
                <button id="prevBtn" class="carousel-btn">&#10094;</button>

                <div class="book-card" id="carouselCard">
                    <img id="bookImage" src="" alt="Book cover">
                    <h3 id="bookTitle"></h3>
                    <p id="bookAuthor"></p>
                    <p id="bookDescription"></p>
                </div>

                <button id="nextBtn" class="carousel-btn">&#10095;</button>
            </div>
        </section>

        <section class="book-list-section">
            <h2>Book List</h2>
            <div id="bookList" class="book-list"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Book Haven. All rights reserved.</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
