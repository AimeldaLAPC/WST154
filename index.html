<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WST 154 Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #e3f2fd;
            color: #1565c0;
        }

        header {
            background: #1565c0;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border: 2px solid white;
            border-radius: 5px;
            transition: .3s;
        }

        nav a:hover {
            background: white;
            color: #1565c0;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .15);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #1565c0;
        }

        .card a {
            display: inline-block;
            text-decoration: none;
            background: #1e88e5;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: .3s;
        }

        .card a:hover {
            background: #0d47a1;
        }

        footer {
            text-align: center;
            padding: 25px;
            margin-top: 40px;
            background: #1565c0;
            color: white;
        }
    </style>
</head>

<body>

<header>

    <nav>
        <a href="https://aimeldalapc.github.io/WST154/">Home</a>
    </nav>

    <h1>Welcome to My WST 154 Projects</h1>
    <p>Gigi Adobo | Web Software Technology</p>

</header>

<main>

    <h2>Assignments</h2>

    <div class="projects">

        <div class="card">
            <h3>Assignment 1</h3>
            <a href="https://aimeldalapc.github.io/WST154/Assignment1/">View Project</a>
        </div>

        <div class="card">
            <h3>Assignment 2</h3>
            <a href="https://aimeldalapc.github.io/WST154/Assignment2/">View Project</a>
        </div>

        <div class="card">
            <h3>Assignment 3</h3>
            <a href="https://aimeldalapc.github.io/WST154/Assignment3/">View Project</a>
        </div>

    </div>

</main>

<footer>
    <p>&copy; 2026 Gigi Adobo | WST 154</p>
</footer>

</body>
</html>
